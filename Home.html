            <svg

              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"

                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="searchInput"
              class="max-sm:w-[80px] border-gray-300 rounded-md "

      <div

        <button

          All

        <button
          onclick="switchBtn('openBtn')"

          class="btn w-[100px] max-sm:w-[70px]"

        </button>
        <button
          onclick="switchBtn('closeBtn')"
          id="closeBtn"
          class="btn w-[100px] max-sm:w-[70px]"
        >
          Close
        </button>
      </div>

          <p class="font-semibold max-sm:text-sm">
