<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | GitHub Issue Tracking</title>
    <!-- tailwind and desiyUI  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- link css  -->
    <link rel="stylesheet" href="/style/home.css" />
  </head>
  <body class="bg-base-200 min-h-screen">
    <header>
      <div class="navbar flex justify-between bg-base-100 shadow-sm px-20">
        <div class="flex items-center justify-center gap-1">
          <img class="w-10" src="./assets/github-logo.png" alt="weblogo" />
          <h1><a class="text-2xl font-bold">GitHub Issues Tracker</a></h1>
        </div>
        <div class="flex items-center justify-center gap-1">
          <input
          id="searchInput"
            type="text"
            placeholder="Search Issues..."
            class="p-2 outline-none border-gray-300 rounded"
          />
          <button id="searchButton" class="btn btn-primary">search</button>
        </div>
      </div>
    </header>

    <main class="w-[90%] mx-auto">
      <!-- button container  -->
      <div class="bg-white p-4 my-5 rounded-xl">
        <button onclick="switchBtn('allBtn')" id="allBtn" class="btn w-[100px] btn-primary">All</button>
        <button onclick="switchBtn('openBtn')" id="openBtn" class="btn w-[100px] ">Open</button>
        <button onclick="switchBtn('closeBtn')" id="closeBtn" class="btn w-[100px]">Close</button>
      </div>

      <!-- total issues container  -->
      <div
        class="bg-white p-4 my-5 rounded-xl flex justify-between items-center"
      >
        <div class="flex items-center gap-4">
          <img
            class="bg-gray-300 rounded-3xl p-1"
            src="./assets/Aperture.png"
            alt=""
          />
          <div>
            <h1 class="font-bold text-xl">
              <span id="totalIssue">00</span> Issues
            </h1>
            <p class="opacity-90">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex justify-center items-center gap-4">
          <p class="font-semibold">
            <span class="text-2xl text-[#00a96e]">●</span> Open
          </p>
          <p class="font-semibold">
            <span class="text-[#a855f7] text-2xl">●</span> Close
          </p>
        </div>
      </div>

      <!-- all card container  -->

      <section>
        <div
          id="allCard-Container"
          class="p-5 mx-auto grid grid-cols-4 max-sm:grid-cols-1 gap-4 shadow-xl"
        >
          <div
            class="bg-white space-y-2 p-3 rounded-xl border-t-3 border-green-400 shadow hover:scale-[0.99]"
          >
            <div class="p-2">
              <div class="flex justify-between items-center">
                <img src="./assets/Open-Status.png" alt="" />
                <p
                  class="bg-red-200 px-4 rounded-xl text-red-400 font-semibold"
                >
                  High
                </p>
              </div>
            </div>

            <div>
              <h1 class="font-bold">Fix navigation menu on mobile devices</h1>
              <p class="text-sm line-clamp-2">
                The navigation menu doesn't collapse properly on mobile devices.
                Need to fix the responsive behavior
              </p>
            </div>

            <div class="flex gap-3">
              <p class="bg-red-200 px-4 rounded-xl text-red-400 font-[500]">
                Bug
              </p>
              <p
                class="bg-yellow-100 px-4 rounded-xl text-yellow-600 font-[500]"
              >
                Help Wanted
              </p>
            </div>

            <div class="h-px bg-gray-300 my-5"></div>

            <div>
              <p class="opacity-85"># mike_docs</p>
              <p class="opacity-85">date and time</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Open the modal using ID.showModal() method -->
      <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
