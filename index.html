<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracking | Log In</title>
    <!-- tailwind and desiyUI  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body
    class="mx-auto min-h-screen   flex justify-center items-center bg-gray-100"
  >
    <section class=" w-[30%] max-sm:w-[90%] mx-auto bg-white p-8 rounded-xl">
      <div>
        <div class="flex flex-col items-center justify-center h-[140px]">
          <img src="./assets/github-logo.png" alt="github-logo" />
          <h1 class="font-bold text-2xl mt-2">GitHub Issues Tracker</h1>
          <p class="opacity-80">Sign in to manage your issues</p>
        </div>

        <div>
          <fieldset class="fieldset rounded-box  p-4 ">
            <label class="label text-neutral">Username</label>
            <input id="inputUsername" type="text" class="input" placeholder="Email" />

            <label class="label text-neutral">Password</label>
            <input id="inputPassword" type="password" class="input" placeholder="Password" />

            <button id="loginBtn" class="btn btn-primary mt-4">Login</button>
          </fieldset>
        </div>

        <div class="flex items-center">
          <div class="flex-grow h-px bg-gray-300"></div>
          <span class="px-3 text-gray-500">OR</span>
          <div class="flex-grow h-px bg-gray-300"></div>
        </div>

        <div class="text-center bg-gray-100 py-2">
            <p class="text-sm mb-3">Demo Credentials:</p>
            <p class="font-semibold text-sm">Username: admin</p>
            <p class="font-semibold text-sm">Password: admin123</p>
        </div>
      </div>
    </section>

    <script src="./script/index.js"></script>
  </body>
</html>
